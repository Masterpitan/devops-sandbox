services:
  nginx:
    image: nginx:alpine
    container_name: sandbox-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    image: sandbox-api
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sandbox-api
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - ./platform:/app/platform
      - ./envs:/app/envs
      - ./logs:/app/logs
      - ./nginx/conf.d:/app/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - API_PORT=${API_PORT:-5000}
      - DOCKER_HOST=unix:///var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"

  health-poller:
    image: sandbox-api
    container_name: sandbox-health-poller
    command: python3 /app/monitor/health_poller.py
    volumes:
      - ./monitor:/app/monitor
      - ./envs:/app/envs
      - ./logs:/app/logs
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
